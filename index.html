<!DOCTYPE html>
<html lang="es" data-theme="taberna">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM Board — Tablero de Combate</title>

  <!-- Fonts (loaded from CDN, fallback to system) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&family=Lato:wght@400;500;600;700&family=Oswald:wght@500;600&family=Source+Sans+3:wght@400;500;600&family=Sorts+Mill+Goudy&family=Nunito:wght@400;500;600&family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&family=Alegreya:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>

  <!-- Fallback warning for file:// protocol (CORS blocks ES modules) -->
  <script>
    if (window.location.protocol === 'file:') {
      document.addEventListener('DOMContentLoaded', () => {
        const warning = document.createElement('div');
        warning.style.cssText = 'background: #c0392b; color: white; padding: 12px; text-align: center; font-weight: bold; font-family: sans-serif; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; box-shadow: 0 4px 6px rgba(0,0,0,0.2);';
        warning.innerHTML = '⚠️ <strong>DM Board:</strong> No se pueden cargar los módulos JavaScript directamente desde un archivo local (CORS). Por favor, ejecuta la aplicación usando un servidor local (p. ej. ejecutando <code>./start.sh</code> o <code>python3 -m http.server 8080</code>) y ábrela en <a href="http://localhost:8080" style="color: #5decff; text-decoration: underline;">http://localhost:8080</a>.';
        document.body.insertBefore(warning, document.body.firstChild);
      });
    }
  </script>
  <noscript>
    <div style="background: #c0392b; color: white; padding: 12px; text-align: center; font-weight: bold; font-family: sans-serif; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;">
      ⚠️ <strong>DM Board:</strong> Esta aplicación requiere JavaScript para funcionar. Por favor, actívalo en tu navegador.
    </div>
  </noscript>

<div id="app">
  <!-- Header -->
  <header class="app-header">
    <h1 style="font-size:1.2rem;margin:0;white-space:nowrap">🎯 DM Board</h1>

    <div class="campaign-selector">
      <select id="campaign-select" data-i18n-aria="header.new_campaign"></select>
      <button class="btn btn-sm btn-secondary" id="btn-new-campaign"
              data-i18n-title="header.new_campaign">+</button>
      <button class="btn btn-sm btn-secondary" id="btn-rename-campaign"
              data-i18n-title="header.rename_campaign">✎</button>
      <button class="btn btn-sm btn-danger" id="btn-delete-campaign"
              data-i18n-title="header.delete_campaign">🗑</button>
    </div>

    <div style="display:flex;gap:0.4rem;align-items:center">
      <button class="btn btn-sm btn-secondary" id="btn-toggle-theme"
              data-i18n-title="header.change_theme">🎨</button>
      <!-- Language toggle -->
      <button class="btn btn-sm btn-secondary" id="btn-lang"
              data-i18n="header.lang_toggle"
              style="font-weight:700;min-width:2.2rem">EN</button>
    </div>
  </header>

  <!-- Main Area -->
  <div class="app-main">
    <!-- Board -->
    <div class="board-area" id="board-area">
      <div class="board-empty">
        <div style="font-size:2.5rem">🎯</div>
        <div data-i18n-html="board.empty.hint">Añade criaturas con el botón <strong>"+ Criatura"</strong></div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Toolbar -->
      <div class="board-toolbar">
        <button class="btn btn-primary" id="btn-add-token"
                data-i18n="toolbar.add_token">＋ Criatura</button>
        <button class="btn btn-sm btn-secondary" id="btn-toggle-size"
                data-i18n-title="toolbar.expand"
                data-i18n="toolbar.expand">⤢ Expandir</button>
        <span style="font-size:0.7rem;color:var(--text-secondary);align-self:center;margin-left:auto"
              data-i18n="toolbar.hint">✎ editar • ⤢ click en imagen</span>
      </div>

      <!-- Sidebar Tabs -->
      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="tab-combat"
                data-i18n="tab.combat">⚔️ Combate</button>
        <button class="tab-btn" data-tab="tab-prep"
                data-i18n="tab.prep">🗺️ Prep &amp; Almacén</button>
      </div>

      <!-- Theme Picker (hidden by default) -->
      <div class="panel-card" id="theme-panel" style="display:none">
        <h3 data-i18n="theme.title">🎨 Tema de Campaña</h3>
        <div id="theme-picker"></div>
      </div>

      <!-- Tab Content 1: Combat -->
      <div class="tab-content" id="tab-combat">
        <!-- Players -->
        <div class="panel-card" id="players-panel">
          <h3 data-i18n="players.title">👥 Jugadores</h3>
          <div style="color:var(--text-secondary);font-size:0.85rem" data-i18n="players.empty">Cargando...</div>
        </div>

        <!-- Initiative -->
        <div class="panel-card" id="initiative-panel">
          <h3 data-i18n="initiative.title">⚔️ Iniciativa</h3>
          <div style="color:var(--text-secondary);font-size:0.85rem" data-i18n="initiative.empty">Cargando...</div>
        </div>
      </div>

      <!-- Tab Content 2: Prep & Vault -->
      <div class="tab-content" id="tab-prep" style="display:none">
        <!-- Locations -->
        <div class="panel-card" id="locations-panel">
          <h3 data-i18n="locations.title">🗺️ Localizaciones</h3>
          <div style="color:var(--text-secondary);font-size:0.85rem" data-i18n="players.empty">Cargando...</div>
        </div>

        <!-- Vault -->
        <div class="panel-card" id="vault-panel">
          <h3 data-i18n="vault.title">📁 Almacén de Criaturas</h3>
          <div style="color:var(--text-secondary);font-size:0.85rem" data-i18n="players.empty">Cargando...</div>
        </div>
      </div>
    </aside>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
